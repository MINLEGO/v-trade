services:
  migrate:
    build: .
    command: ["python", "-m", "vtrade.migrate"]
    restart: "no"
    env_file: [.env]
    read_only: true
    tmpfs: [/tmp]
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]

  api:
    build: .
    command: ["uvicorn", "vtrade.api:create_app", "--factory", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped
    env_file: [.env]
    read_only: true
    tmpfs: [/tmp]
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    stop_grace_period: 30s
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import os,urllib.request;
          r=urllib.request.Request('http://127.0.0.1:8000/health/live',headers={'Authorization':'Bearer '+os.environ['VTRADE_ADMIN_AUTH_SECRET']});
          urllib.request.urlopen(r)
      interval: 30s
      timeout: 5s
      retries: 3
  worker:
    build: .
    command: ["python", "-m", "vtrade.worker"]
    restart: unless-stopped
    env_file: [.env]
    read_only: true
    tmpfs: [/tmp]
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    stop_grace_period: 60s
    depends_on:
      migrate:
        condition: service_completed_successfully
      api:
        condition: service_healthy
