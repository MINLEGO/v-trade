services:
  api:
    build: .
    command: ["uvicorn", "vtrade.api:create_app", "--factory", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped
    env_file: [.env]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live')"]
      interval: 30s
      timeout: 5s
      retries: 3
  worker:
    build: .
    command: ["python", "-m", "vtrade.worker"]
    restart: unless-stopped
    env_file: [.env]
    depends_on: [api]

